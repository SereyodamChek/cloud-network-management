<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Cloud Network Management</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css">
  <style>
    /* ── Page reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0b0f1a;
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Animated grid background ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(167,139,250,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,139,250,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridShift 20s linear infinite;
      z-index: 0;
    }
    @keyframes gridShift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* ── Ambient orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
      animation: orbDrift 14s ease-in-out infinite alternate;
    }
    .orb-1 { width: 520px; height: 520px; background: radial-gradient(circle, #6d28d9, transparent 70%); top: -180px; left: -160px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #0ea5e9, transparent 70%); bottom: -120px; right: -100px; animation-delay: 4s; }
    .orb-3 { width: 280px; height: 280px; background: radial-gradient(circle, #10b981, transparent 70%); bottom: 20%; left: 10%; animation-delay: 8s; opacity: 0.25; }
    @keyframes orbDrift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 50px) scale(1.1); }
    }

    /* ── Floating particles ── */
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: particleFloat linear infinite;
      opacity: 0;
    }
    @keyframes particleFloat {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── Login card ── */
    .login-scene {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 360px;
      padding: 36px 28px 30px;
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(32px) saturate(200%);
      -webkit-backdrop-filter: blur(32px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      box-shadow:
        0 0 0 1px rgba(167,139,250,0.12),
        0 32px 64px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.12);
      animation: cardEntrance 0.9s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* ── Logo / Brand ── */
    .login-brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6d28d9, #0ea5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 10px 32px rgba(109,40,217,0.45);
      animation: iconGlow 3s ease-in-out infinite alternate;
    }
    @keyframes iconGlow {
      from { box-shadow: 0 12px 40px rgba(109,40,217,0.45); }
      to   { box-shadow: 0 12px 60px rgba(14,165,233,0.6); }
    }
    .brand-title {
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 30%, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .brand-sub {
      font-size: 14px;
      color: rgba(232,234,246,0.45);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* ── Flash alerts ── */
    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
      animation: alertSlide 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes alertSlide {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .alert.success {
      background: rgba(52,211,153,0.12);
      color: #34d399;
      border: 1px solid rgba(52,211,153,0.3);
    }
    .alert.danger {
      background: rgba(248,113,113,0.12);
      color: #f87171;
      border: 1px solid rgba(248,113,113,0.3);
    }

    /* ── Form ── */
    .login-form { display: flex; flex-direction: column; gap: 14px; }

    .input-group {
      position: relative;
      animation: inputReveal 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    .input-group:nth-child(1) { animation-delay: 0.15s; }
    .input-group:nth-child(2) { animation-delay: 0.25s; }
    @keyframes inputReveal {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 17px;
      pointer-events: none;
      transition: transform 0.3s ease;
      z-index: 2;
    }

    .login-form input {
      width: 100%;
      padding: 13px 14px 13px 44px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #e8eaf6;
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      outline: none;
      transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    }
    .login-form input::placeholder {
      color: rgba(232,234,246,0.3);
      font-weight: 500;
    }
    .login-form input:focus {
      border-color: rgba(167,139,250,0.6);
      background: rgba(167,139,250,0.08);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.15), inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .login-form input:focus + .input-icon-label .input-icon,
    .input-group:focus-within .input-icon {
      transform: translateY(-50%) scale(1.15);
    }

    /* ── Submit button ── */
    .login-btn {
      position: relative;
      margin-top: 4px;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #0ea5e9);
      color: #fff;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
      box-shadow: 0 6px 24px rgba(124,58,237,0.4);
      animation: inputReveal 0.6s cubic-bezier(0.22,1,0.36,1) 0.35s both;
    }
    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .login-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 16px 48px rgba(124,58,237,0.55);
    }
    .login-btn:hover::before { opacity: 1; }
    .login-btn:active { transform: translateY(0) scale(0.98); }

    /* Shimmer sweep on button */
    .login-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -120%;
      width: 80%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: skewX(-20deg);
      animation: shimmerSweep 3.5s ease-in-out infinite;
    }
    @keyframes shimmerSweep {
      0%   { left: -120%; }
      50%, 100% { left: 140%; }
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
      opacity: 0.4;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.2);
    }
    .divider span { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 1px; }

    /* ── Hint ── */
    .hint-row {
      margin-top: 18px;
      text-align: center;
      animation: inputReveal 0.6s cubic-bezier(0.22,1,0.36,1) 0.45s both;
    }
    .hint-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(232,234,246,0.4);
      letter-spacing: 0.2px;
    }
    .hint-chip code {
      color: rgba(167,139,250,0.8);
      background: rgba(167,139,250,0.1);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
    }

    /* ── Footer tag ── */
    .login-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 10px;
      color: rgba(232,234,246,0.2);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .login-scene {
        max-width: 100%;
        padding: 28px 20px 24px;
        border-radius: 20px;
      }
      .brand-icon { width: 48px; height: 48px; font-size: 24px; }
      .brand-title { font-size: 20px; }
    }
  </style>
</head>
<body>

  <!-- Backgrounds -->
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="particles" id="particles"></div>

  <!-- Card -->
  <div class="login-scene">

    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-icon"><i class="fi fi-sr-wifi-alt"></i></div>
      <div class="brand-title">CloudDom</div>
      <div class="brand-sub">Management Console</div>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Form -->
    <form method="POST" class="login-form">

      <div class="input-group">
        <span class="input-icon"><i class="fi fi-sr-user"></i></span>
        <input type="text" name="username" placeholder="Username" required autocomplete="username">
      </div>

      <div class="input-group">
        <span class="input-icon"><i class="fi fi-sr-key"></i></span>
        <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
      </div>

      <button type="submit" class="login-btn">Sign In</button>

    </form>

    <!-- Hint -->
    <div class="hint-row">
      <span class="hint-chip">
        Security &nbsp;
        &NotSucceeds;;
        
      </span>
    </div>

    <div class="login-footer">Secured Network Access</div>

  </div>

  <script>
    /* Floating particles */
    (function spawnParticles() {
      const container = document.getElementById('particles');
      const colors = ['#a78bfa','#38bdf8','#34d399','#f472b6','#fbbf24','#818cf8'];
      for (let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 5 + 2;
        Object.assign(p.style, {
          width:  size + 'px',
          height: size + 'px',
          left: Math.random() * 100 + 'vw',
          background: colors[Math.floor(Math.random() * colors.length)],
          animationDuration: (Math.random() * 14 + 8) + 's',
          animationDelay:    (Math.random() * 12) + 's',
          boxShadow: `0 0 ${size * 2}px currentColor`
        });
        container.appendChild(p);
      }
    })();

    /* Input focus micro-animation */
    document.querySelectorAll('.login-form input').forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.querySelector('.input-icon').style.transform = 'translateY(-50%) scale(1.2) rotate(-8deg)';
      });
      input.addEventListener('blur', () => {
        input.parentElement.querySelector('.input-icon').style.transform = 'translateY(-50%) scale(1) rotate(0deg)';
      });
    });

    /* Button press ripple */
    document.querySelector('.login-btn').addEventListener('click', function(e) {
      const ripple = document.createElement('span');
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      Object.assign(ripple.style, {
        position: 'absolute',
        width: size + 'px',
        height: size + 'px',
        left: (e.clientX - rect.left - size/2) + 'px',
        top:  (e.clientY - rect.top  - size/2) + 'px',
        background: 'rgba(255,255,255,0.25)',
        borderRadius: '50%',
        transform: 'scale(0)',
        transition: 'transform 0.5s ease, opacity 0.5s ease',
        opacity: '1',
        pointerEvents: 'none'
      });
      this.appendChild(ripple);
      requestAnimationFrame(() => {
        ripple.style.transform = 'scale(2.5)';
        ripple.style.opacity = '0';
      });
      setTimeout(() => ripple.remove(), 550);
    });
  </script>

</body>
</html>
